<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscriptions — Centre de Formation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">
    <!-- ── Sidebar ─────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <span>CentreFormation</span>
      </div>

      <span class="nav-section-title">Navigation</span>
      <a href="dashboard.html"  class="nav-link"><span class="icon">📊</span> Dashboard</a>
      <a href="students.html"   class="nav-link"><span class="icon">👥</span> Étudiants</a>
      <a href="trainers.html" class="nav-link"><span class="icon">👨‍🏫</span> Formateurs</a>
      <a href="formations.html" class="nav-link"><span class="icon">📚</span> Formations</a>
      <a href="enroll.html"     class="nav-link"><span class="icon">📝</span> Inscriptions</a>

      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">—</div>
            <div class="user-role" id="sidebar-role">—</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-logout" id="btn-logout">⏻ Déconnexion</button>
      </div>
    </aside>

    <!-- ── Contenu principal ───────────────────────────── -->
    <main class="main-content">
      <div class="topbar">
        <h1>Nouvelle inscription</h1>
      </div>

      <div class="page-body">

        <div class="alert" id="alert-enroll"></div>

        <!-- Formulaire d'inscription -->
        <div class="table-card" style="max-width:580px;padding:1.8rem 2rem;">
          <h2 style="font-size:1rem;font-weight:600;margin-bottom:1.5rem;">
            📝 Inscrire un étudiant à une formation
          </h2>

          <!-- Sélection étudiant -->
          <div class="form-group">
            <label for="select-student">Étudiant</label>
            <select id="select-student">
              <option value="">— Chargement des étudiants… —</option>
            </select>
          </div>

          <!-- Sélection formation -->
          <div class="form-group">
            <label for="select-formation">Formation</label>
            <select id="select-formation">
              <option value="">— Chargement des formations… —</option>
            </select>
          </div>

          <!-- Date d'inscription -->
          <div class="form-group">
            <label for="enroll-date">Date d'inscription</label>
            <input type="date" id="enroll-date">
          </div>

          <!-- Note / commentaire -->
          <div class="form-group">
            <label for="enroll-note">Note (optionnel)</label>
            <textarea id="enroll-note" rows="2" placeholder="Remarques particulières…" style="resize:vertical"></textarea>
          </div>

          <!-- Récapitulatif -->
          <div id="recap-box" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;font-size:.88rem;">
            <strong style="font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">Récapitulatif</strong>
            <div id="recap-content" style="margin-top:.5rem;"></div>
          </div>

          <div style="display:flex;gap:.8rem;justify-content:flex-end;">
            <a href="formations.html" class="btn btn-ghost">Annuler</a>
            <button class="btn btn-accent" id="btn-enroll">📝 Valider l'inscription</button>
          </div>
        </div>

        <!-- Historique des inscriptions récentes -->
        <div class="table-card" style="margin-top:1.5rem;">
          <div class="table-card-header">
            <span class="table-card-title">Inscriptions récentes</span>
            <button class="btn btn-ghost btn-sm" id="btn-refresh-enrollments">↻ Actualiser</button>
          </div>
          <div id="enrollments-container">
            <div class="loading-overlay"><div class="spinner"></div> Chargement…</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    initSidebar();

    // ── Pré-remplissage depuis URL (ex: formations.html → enroll.html?formation_id=5) ──
    const urlParams    = new URLSearchParams(window.location.search);
    const preFormation = urlParams.get('formation_id');

    // ── Chargement des sélects ────────────────────────────
    async function loadSelects() {
      // Charger étudiants
      const sRes = await apiFetch('/student');
      const students = sRes.ok
        ? (Array.isArray(sRes.data) ? sRes.data : (sRes.data.data || []))
        : [];

      const sSelect = document.getElementById('select-student');
      sSelect.innerHTML = students.length
        ? `<option value="">— Sélectionner un étudiant —</option>` +
          students.map(s =>
            `<option value="${s.id}">${s.firstname || s.first_name || ''} ${s.lastname || s.last_name || s.name || ''} (${s.email || ''})</option>`
          ).join('')
        : `<option value="">Aucun étudiant disponible</option>`;

      // Charger formations
      const fRes = await apiFetch('/formations');
      const formations = fRes.ok
        ? (Array.isArray(fRes.data) ? fRes.data : (fRes.data.data || []))
        : [];

      const fSelect = document.getElementById('select-formation');
      fSelect.innerHTML = formations.length
        ? `<option value="">— Sélectionner une formation —</option>` +
          formations.map(f =>
            `<option value="${f.id}" ${preFormation == f.id ? 'selected' : ''}>${f.title || f.name || 'Formation #' + f.id}</option>`
          ).join('')
        : `<option value="">Aucune formation disponible</option>`;

      updateRecap();
    }

    // ── Récapitulatif dynamique ───────────────────────────
    function updateRecap() {
      const sSelect = document.getElementById('select-student');
      const fSelect = document.getElementById('select-formation');
      const recapBox = document.getElementById('recap-box');
      const recapContent = document.getElementById('recap-content');

      const studentText   = sSelect.options[sSelect.selectedIndex]?.text || '';
      const formationText = fSelect.options[fSelect.selectedIndex]?.text || '';
      const date = document.getElementById('enroll-date').value;

      if (sSelect.value && fSelect.value) {
        recapBox.style.display = 'block';
        recapContent.innerHTML = `
          <div style="display:grid;gap:.3rem">
            <div>👤 <strong>${studentText}</strong></div>
            <div>📚 <strong>${formationText}</strong></div>
            ${date ? `<div>📅 <strong>${new Date(date).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })}</strong></div>` : ''}
          </div>`;
      } else {
        recapBox.style.display = 'none';
      }
    }

    document.getElementById('select-student').addEventListener('change', updateRecap);
    document.getElementById('select-formation').addEventListener('change', updateRecap);
    document.getElementById('enroll-date').addEventListener('change', updateRecap);

    // Pré-remplir la date avec aujourd'hui
    document.getElementById('enroll-date').value = new Date().toISOString().split('T')[0];

    // ── Soumission de l'inscription ───────────────────────
    document.getElementById('btn-enroll').addEventListener('click', async () => {
      const student_id   = document.getElementById('select-student').value;
      const formation_id = document.getElementById('select-formation').value;
      const date         = document.getElementById('enroll-date').value;
      const note         = document.getElementById('enroll-note').value.trim();

      if (!student_id || !formation_id) {
        showAlert('alert-enroll', 'Veuillez sélectionner un étudiant et une formation.', 'error');
        return;
      }

      const btn = document.getElementById('btn-enroll');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Inscription en cours…';

      const body = { student_id: Number(student_id), formation_id: Number(formation_id) };
      if (date) body.enrollment_date = date;
      if (note) body.note = note;

      const result = await apiFetch('/formations/enroll', {
        method: 'POST',
        body: JSON.stringify(body),
      });

      btn.disabled = false;
      btn.innerHTML = '📝 Valider l\'inscription';

      if (result.ok) {
        showAlert('alert-enroll', '✓ Inscription réalisée avec succès !', 'success');
        // Réinitialiser le formulaire
        document.getElementById('select-student').selectedIndex   = 0;
        document.getElementById('select-formation').selectedIndex = 0;
        document.getElementById('enroll-note').value = '';
        document.getElementById('enroll-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('recap-box').style.display = 'none';
        loadEnrollments();
      } else {
        showAlert('alert-enroll', result.data?.message || 'Erreur lors de l\'inscription.', 'error');
      }
    });

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('fr-FR', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }
    
    // ── Liste des inscriptions récentes ───────────────────
    async function loadEnrollments() {
      document.getElementById('enrollments-container').innerHTML = `
        <div class="loading-overlay"><div class="spinner"></div> Chargement…</div>`;

      // Essaie GET /enrollments ou GET /formations/enrollments selon votre API
      const result = await apiFetch('/formations/enrollments');

      if (!result.ok) {
        showEmpty('enrollments-container', 'Impossible de charger les inscriptions.');
        return;
      }

      const enrollments = Array.isArray(result.data) ? result.data : (result.data.data || []);

      if (enrollments.length === 0) {
        showEmpty('enrollments-container', 'Aucune inscription enregistrée.');
        return;
      }

      document.getElementById('enrollments-container').innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Étudiant</th>
              <th>Formation</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${enrollments.map(e => `
              <tr>
                <td><span class="badge badge-blue">${e.id}</span></td>
                <td>${e.student_name || '—'}</td>
                <td>${e.formation_title || '—'}</td>
                <td>${formatDate ? formatDate(e.enrollment_date) : e.enrollment_date || '—'}</td>
                <td><span class="badge badge-green">${e.status || 'Inscrit'}</span></td>
                <td>
                  <button class="btn btn-danger btn-sm" onclick="deleteEnrollment(${e.id})">
                    🗑 Supprimer
                  </button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
    
    async function deleteEnrollment(id) {
      if (!confirm("Supprimer cette inscription ?")) return;

      const result = await apiFetch(`/formations/enrollments/${id}`, {
        method: 'DELETE'
      });

      if (result.ok) {
        showAlert('alert-enroll', 'Inscription supprimée.', 'success');
        loadEnrollments();
      } else {
        showAlert('alert-enroll', result.data?.message || 'Erreur lors de la suppression.', 'error');
      }
    }
    // ── Init ──────────────────────────────────────────────
    loadSelects();
    loadEnrollments();
    document.getElementById('btn-refresh-enrollments').addEventListener('click', loadEnrollments);
  </script>
</body>
</html>
