<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Étudiants — Centre de Formation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">
    <!-- ── Sidebar ─────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <span>CentreFormation</span>
      </div>

      <span class="nav-section-title">Navigation</span>
      <a href="dashboard.html"  class="nav-link"><span class="icon">📊</span> Dashboard</a>
      <a href="students.html"   class="nav-link"><span class="icon">👥</span> Étudiants</a>
      <a href="trainers.html"   class="nav-link"><span class="icon">👨‍🏫</span> Formateurs</a>
      <a href="formations.html" class="nav-link"><span class="icon">📚</span> Formations</a>

      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">—</div>
            <div class="user-role" id="sidebar-role">—</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-logout" id="btn-logout">⏻ Déconnexion</button>
      </div>
    </aside>

    <!-- ── Contenu principal ───────────────────────────── -->
    <main class="main-content">
      <div class="topbar">
        <h1>Gestion des étudiants</h1>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" id="btn-open-add">+ Ajouter un étudiant</button>
        </div>
      </div>

      <div class="page-body">

        <div class="alert" id="alert-students"></div>

        <!-- Tableau des étudiants -->
        <div class="table-card">
          <div class="table-card-header">
            <span class="table-card-title">Liste des étudiants</span>
            <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ Actualiser</button>
          </div>
          <div id="students-container">
            <div class="loading-overlay">
              <div class="spinner"></div> Chargement…
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ── Modale Ajouter Étudiant ─────────────────────────── -->
  <div class="modal-overlay" id="modal-add-student">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Ajouter un étudiant</span>
        <button class="modal-close" onclick="closeModal('modal-add-student')">✕</button>
      </div>

      <div class="alert" id="alert-modal"></div>

      <div class="form-group">
        <label for="s-firstname">Prénom</label>
        <input type="text" id="s-name" placeholder="Marie Dupont">
      </div>
      <div class="form-group">
        <label for="s-email">E-mail</label>
        <input type="email" id="s-email" placeholder="marie.dupont@example.com">
      </div>
      <div class="form-group">
        <label for="s-phone">Téléphone</label>
        <input type="tel" id="s-phone" placeholder="+33 6 00 00 00 00">
      </div>
      <div class="form-group">
        <label for="s-password">Mot de passe</label>
        <input type="password" id="s-password" placeholder="Minimum 6 caractères">
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-add-student')">Annuler</button>
        <button class="btn btn-primary" id="btn-save-student">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Modale Confirmation suppression ────────────────── -->
  <div class="modal-overlay" id="modal-confirm-delete">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <span class="modal-title">Confirmer la suppression</span>
        <button class="modal-close" onclick="closeModal('modal-confirm-delete')">✕</button>
      </div>
      <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1rem;">
        Êtes-vous sûr de vouloir supprimer cet étudiant ? Cette action est irréversible.
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-confirm-delete')">Annuler</button>
        <button class="btn btn-danger" id="btn-confirm-delete">Supprimer</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    initSidebar();

    let deleteTargetId = null; // stocke l'id de l'étudiant à supprimer

    // ── Chargement de la liste ────────────────────────────
    async function loadStudents() {
      document.getElementById('students-container').innerHTML = `
        <div class="loading-overlay"><div class="spinner"></div> Chargement…</div>`;
      hideAlert('alert-students');

      const result = await apiFetch('/student');

      if (!result.ok) {
        showAlert('alert-students', result.data?.message || 'Erreur de chargement.', 'error');
        showEmpty('students-container', 'Impossible de charger les étudiants.');
        return;
      }

      // L'API peut renvoyer directement un tableau ou { data: [...] }
      const students = Array.isArray(result.data) ? result.data : (result.data.data || []);

      if (students.length === 0) {
        showEmpty('students-container', 'Aucun étudiant enregistré pour le moment.');
        return;
      }

      // Construire le tableau HTML
      document.getElementById('students-container').innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nom complet</th>
              <th>E-mail</th>
              <th>Téléphone</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${students.map(s => `
              <tr>
                <td><span class="badge badge-blue">${s.id}</span></td>
                <td><strong>${s.name || '—'}</strong></td>
                <td style="color:var(--text-muted)">${s.email || '—'}</td>
                <td style="color:var(--text-muted)">${s.phone || s.telephone || '—'}</td>
                <td>
                  <button class="btn btn-danger btn-sm" onclick="askDelete(${s.id})">🗑 Supprimer</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // ── Ajout d'un étudiant ───────────────────────────────
    document.getElementById('btn-open-add').addEventListener('click', () => {
      // Vider le formulaire
      ['s-name','s-email'].forEach(id => {
        document.getElementById(id).value = '';
      });
      hideAlert('alert-modal');
      openModal('modal-add-student');
    });

    document.getElementById('btn-save-student').addEventListener('click', async () => {
      const name  = document.getElementById('s-name').value.trim();
      const email = document.getElementById('s-email').value.trim();
      const phone = document.getElementById('s-phone').value.trim();
      const password = document.getElementById('s-password').value.trim();
      
      if (!name || !email) {
        showAlert('alert-modal', 'nom et e-mail sont obligatoires.', 'error');
        return;
      }

      const btn = document.getElementById('btn-save-student');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const result = await apiFetch('/student', {
        method: 'POST',
        body: JSON.stringify({ name, email, phone, password, role: 'etudiant' }),
      });

      btn.disabled = false;
      btn.innerHTML = 'Enregistrer';

      if (result.ok) {
        closeModal('modal-add-student');
        showAlert('alert-students', 'Étudiant ajouté avec succès !', 'success');
        loadStudents();
      } else {
        showAlert('alert-modal', result.data?.message || 'Erreur lors de l\'ajout.', 'error');
      }
    });

    // ── Suppression ───────────────────────────────────────
    function askDelete(id) {
      deleteTargetId = id;
      openModal('modal-confirm-delete');
    }

    document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
      if (!deleteTargetId) return;

      const btn = document.getElementById('btn-confirm-delete');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const result = await apiFetch(`/student/${deleteTargetId}`, { method: 'DELETE' });

      btn.disabled = false;
      btn.innerHTML = 'Supprimer';
      closeModal('modal-confirm-delete');
      deleteTargetId = null;

      if (result.ok) {
        showAlert('alert-students', 'Étudiant supprimé.', 'success');
        loadStudents();
      } else {
        showAlert('alert-students', result.data?.message || 'Erreur lors de la suppression.', 'error');
      }
    });
    
    // ── Init ──────────────────────────────────────────────
    loadStudents();
    document.getElementById('btn-refresh').addEventListener('click', loadStudents);

    // Fermer modale en cliquant l'overlay
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
    });
  </script>
</body>
</html>
