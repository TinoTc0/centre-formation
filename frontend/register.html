<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Centre de Formation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <span>CentreFormation</span>
    </div>

    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez la plateforme de gestion</p>

    <!-- Alert zone -->
    <div class="alert" id="alert-register"></div>

    <!-- Formulaire -->
    <div class="form-group">
      <label for="name">Nom complet</label>
      <input type="text" id="name" placeholder="Jean Dupont">
    </div>

    <div class="form-group">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="jean@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Minimum 6 caractères">
    </div>

    <div class="form-group">
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="••••••••">
    </div>

    <button class="btn btn-primary btn-full" id="btn-register">
      Créer mon compte
    </button>

    <p class="auth-link">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </div>

  <script src="app.js"></script>
  <script>
    // Si déjà connecté → rediriger
    redirectIfAuthed();

    document.getElementById('btn-register').addEventListener('click', async () => {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      // Validations
      if (!name || !email || !password || !confirm) {
        showAlert('alert-register', 'Veuillez remplir tous les champs.', 'error');
        return;
      }
      if (password !== confirm) {
        showAlert('alert-register', 'Les mots de passe ne correspondent pas.', 'error');
        return;
      }
      if (password.length < 6) {
        showAlert('alert-register', 'Le mot de passe doit contenir au moins 6 caractères.', 'error');
        return;
      }

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Création…';

      const result = await apiFetch('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ name, email, password }),
      });

      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte';

      if (result.ok) {
        showAlert('alert-register', 'Compte créé avec succès ! Redirection…', 'success');
        // Si l'API renvoie directement un token, on connecte automatiquement
        if (result.data?.token) {
          saveAuth(result.data.token, result.data.user);
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
        } else {
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        }
      } else {
        const msg = result.data?.message || 'Erreur lors de la création du compte.';
        showAlert('alert-register', msg, 'error');
      }
    });
  </script>
</body>
</html>
