<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formateurs — Centre de Formation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <span>CentreFormation</span>
      </div>

      <span class="nav-section-title">Navigation</span>
      <a href="dashboard.html"  class="nav-link"><span class="icon">📊</span> Dashboard</a>
      <a href="students.html"   class="nav-link"><span class="icon">👥</span> Étudiants</a>
      <a href="trainers.html"   class="nav-link"><span class="icon">👨‍🏫</span> Formateurs</a>
      <a href="formations.html" class="nav-link"><span class="icon">📚</span> Formations</a>

      <div class="sidebar-footer">
        <div class="user-badge">
          <div class="user-avatar" id="sidebar-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-username">—</div>
            <div class="user-role" id="sidebar-role">—</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-logout" id="btn-logout">⏻ Déconnexion</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1>Gestion des formateurs</h1>
        <div class="topbar-actions">
          <button class="btn btn-primary btn-sm" id="btn-open-add">+ Ajouter un formateur</button>
        </div>
      </div>

      <div class="page-body">

        <div class="alert" id="alert-trainers"></div>

        <div class="table-card">
          <div class="table-card-header">
            <span class="table-card-title">Liste des formateurs</span>
            <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ Actualiser</button>
          </div>
          <div id="trainers-container">
            <div class="loading-overlay">
              <div class="spinner"></div> Chargement…
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modale Ajouter Formateur -->
  <div class="modal-overlay" id="modal-add-trainer">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Ajouter un formateur</span>
        <button class="modal-close" onclick="closeModal('modal-add-trainer')">✕</button>
      </div>

      <div class="alert" id="alert-modal"></div>

      <div class="form-group">
        <label for="t-name">Nom complet</label>
        <input type="text" id="t-name" placeholder="Jean Dupont">
      </div>
      <div class="form-group">
        <label for="t-email">E-mail</label>
        <input type="email" id="t-email" placeholder="jean@example.com">
      </div>
      <div class="form-group">
        <label for="t-password">Mot de passe</label>
        <input type="password" id="t-password" placeholder="Minimum 6 caractères">
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-add-trainer')">Annuler</button>
        <button class="btn btn-primary" id="btn-save-trainer">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Modale Confirmation suppression -->
  <div class="modal-overlay" id="modal-confirm-delete">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <span class="modal-title">Confirmer la suppression</span>
        <button class="modal-close" onclick="closeModal('modal-confirm-delete')">✕</button>
      </div>
      <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1rem;">
        Êtes-vous sûr de vouloir supprimer ce formateur ? Cette action est irréversible.
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modal-confirm-delete')">Annuler</button>
        <button class="btn btn-danger" id="btn-confirm-delete">Supprimer</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    initSidebar();

    let deleteTargetId = null;

    // ── Chargement de la liste
    async function loadTrainers() {
      document.getElementById('trainers-container').innerHTML = `
        <div class="loading-overlay"><div class="spinner"></div> Chargement…</div>`;
      hideAlert('alert-trainers');

      const result = await apiFetch('/trainer');

      if (!result.ok) {
        showAlert('alert-trainers', result.data?.message || 'Erreur de chargement.', 'error');
        showEmpty('trainers-container', 'Impossible de charger les formateurs.');
        return;
      }

      const trainers = Array.isArray(result.data) ? result.data : (result.data.data || []);

      if (trainers.length === 0) {
        showEmpty('trainers-container', 'Aucun formateur enregistré.');
        return;
      }

      document.getElementById('trainers-container').innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nom</th>
              <th>E-mail</th>
              <th>Membre depuis</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${trainers.map(t => `
              <tr>
                <td><span class="badge badge-blue">${t.id}</span></td>
                <td><strong>${t.name || '—'}</strong></td>
                <td style="color:var(--text-muted)">${t.email || '—'}</td>
                <td style="color:var(--text-muted)">${t.created_at ? new Date(t.created_at).toLocaleDateString('fr-FR') : '—'}</td>
                <td>
                  <button class="btn btn-danger btn-sm" onclick="askDelete(${t.id})">🗑 Supprimer</button>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // ── Ajout
    document.getElementById('btn-open-add').addEventListener('click', () => {
      ['t-name','t-email','t-password'].forEach(id => {
        document.getElementById(id).value = '';
      });
      hideAlert('alert-modal');
      openModal('modal-add-trainer');
    });

    document.getElementById('btn-save-trainer').addEventListener('click', async () => {
      const name     = document.getElementById('t-name').value.trim();
      const email    = document.getElementById('t-email').value.trim();
      const password = document.getElementById('t-password').value.trim();

      if (!name || !email || !password) {
        showAlert('alert-modal', 'Tous les champs sont obligatoires.', 'error');
        return;
      }

      const btn = document.getElementById('btn-save-trainer');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const result = await apiFetch('/trainer', {
        method: 'POST',
        body: JSON.stringify({ name, email, password }),
      });

      btn.disabled = false;
      btn.innerHTML = 'Enregistrer';

      if (result.ok) {
        closeModal('modal-add-trainer');
        showAlert('alert-trainers', 'Formateur ajouté avec succès !', 'success');
        loadTrainers();
      } else {
        showAlert('alert-modal', result.data?.message || 'Erreur lors de l\'ajout.', 'error');
      }
    });

    // ── Suppression
    function askDelete(id) {
      deleteTargetId = id;
      openModal('modal-confirm-delete');
    }

    document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
      if (!deleteTargetId) return;

      const btn = document.getElementById('btn-confirm-delete');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      const result = await apiFetch(`/trainer/${deleteTargetId}`, { method: 'DELETE' });

      btn.disabled = false;
      btn.innerHTML = 'Supprimer';
      closeModal('modal-confirm-delete');
      deleteTargetId = null;

      if (result.ok) {
        showAlert('alert-trainers', 'Formateur supprimé.', 'success');
        loadTrainers();
      } else {
        showAlert('alert-trainers', result.data?.message || 'Erreur lors de la suppression.', 'error');
      }
    });

    // ── Init
    loadTrainers();
    document.getElementById('btn-refresh').addEventListener('click', loadTrainers);

    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.querySelector('.sidebar');
    menuToggle?.addEventListener('click', () => sidebar.classList.toggle('open'));

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
    });
  </script>
</body>
</html>
